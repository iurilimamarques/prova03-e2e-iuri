name: Build and Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:   
    - cron: '0 12 * * *'

jobs:
  build:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5.0.0
    - name: Use Node.js 21
      uses: actions/setup-node@v6.0.0
      with:
        node-version: 22
        cache: 'npm'      
    - run: npm install 
    - run: npx playwright install
    - run: npm run build
    - name: Start preview server
      run: |
        npm run preview > /tmp/vite.log 2>&1 &
        echo $! > /tmp/preview.pid
        sleep 2
    - name: Wait for server
      run: |
        max_attempts=60
        for i in $(seq 1 $max_attempts); do
          if curl -s -f http://localhost:5173/ > /dev/null 2>&1; then
            echo "✓ Server is ready on http://localhost:5173/"
            sleep 2
            exit 0
          fi
          echo "Waiting for server... ($i/$max_attempts)"
          sleep 1
        done
        echo "✗ Server failed to start"
        cat /tmp/vite.log
        exit 1
    - run: npm run actions  
      env:
        ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}       

  sonarcloud:
    name: Run SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0  
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22 
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6.0.0    
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}